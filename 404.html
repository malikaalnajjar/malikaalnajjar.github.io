<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Malik AlNajjar</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23080812'/><text x='50' y='72' font-family='Inter,sans-serif' font-size='58' font-weight='900' text-anchor='middle' fill='%2300e676'>M</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#030803;--cyan:#00e676;--purple:#00c853;--text:#edf5ed;--muted:#527852;--border:rgba(0,230,118,.13)}
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);color:var(--text);font-family:'Manrope',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;overflow:hidden}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,230,118,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(0,230,118,.018) 1px,transparent 1px);background-size:55px 55px;pointer-events:none}
    .orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;opacity:.08}
    .orb1{width:420px;height:420px;background:var(--cyan);top:-100px;right:-100px}
    .orb2{width:320px;height:320px;background:var(--purple);bottom:10%;left:-100px}
    .wrap{position:relative;z-index:1;max-width:520px}
    .code{font-family:'JetBrains Mono',monospace;font-size:clamp(5rem,18vw,9rem);font-weight:800;background:linear-gradient(135deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:.5rem}
    .label{font-family:'JetBrains Mono',monospace;color:var(--cyan);font-size:.82rem;letter-spacing:3px;text-transform:uppercase;margin-bottom:1.5rem;opacity:.7}
    h1{font-size:clamp(1.4rem,4vw,2rem);font-weight:800;margin-bottom:.85rem;letter-spacing:-.02em}
    p{color:var(--muted);font-size:.96rem;line-height:1.75;margin-bottom:2.5rem}
    .btn{display:inline-flex;align-items:center;gap:.5rem;padding:.75rem 1.75rem;background:linear-gradient(135deg,var(--cyan),var(--purple));color:#fff;font-family:'Manrope',sans-serif;font-weight:700;font-size:.9rem;text-decoration:none;border-radius:50px;transition:.3s}
    .btn:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,230,118,.35)}
    .logo{position:fixed;top:1.5rem;left:2rem;font-family:'JetBrains Mono',monospace;font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none;z-index:2}
  </style>
</head>
<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <a href="/" class="logo">MAN</a>
  <div class="wrap">
    <div class="code">404</div>
    <div class="label">Page not found</div>
    <h1>This page doesn't exist</h1>
    <p>The URL you followed may be broken, or the page may have been moved. Head back to the portfolio.</p>
    <a href="/" class="btn">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0h6"/></svg>
      Back to Portfolio
    </a>
  </div>
</body>
</html>
